---
name: Build T430 OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: UTC

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Make ALL scripts executable (CRITICAL FIX)
      run: |
        echo "🔧 Setting execute permissions on ALL scripts..."
        
        # Set permissions from repository root
        chmod +x live-build/build.sh || echo "Warning: build.sh not found"
        chmod +x live-build/config/bootstrap || true
        chmod +x live-build/config/binary || true
        chmod +x live-build/config/chroot || true
        chmod +x live-build/config/common || true
        
        # Set permissions on all hook files
        find live-build/config/hooks -type f -name "*.hook*" -exec chmod +x {} \; 2>/dev/null || true
        
        # Set permissions on ALL .sh files recursively
        find live-build -type f -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
        
        # Verify permissions
        echo "✅ Verifying permissions:"
        ls -la live-build/build.sh
        ls -la live-build/config/
        ls -la live-build/config/hooks/normal/ 2>/dev/null || echo "No normal hooks yet"

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo apt-get clean
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          live-build \
          debootstrap \
          xorriso \
          isolinux \
          syslinux-efi \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          dosfstools \
          squashfs-tools \
          fakeroot \
          rsync \
          wget \
          curl \
          git \
          cpio \
          zstd \
          lz4 \
          xz-utils

    - name: Fix repository mirrors for Debian Bookworm (CRITICAL)
      working-directory: live-build
      run: |
        echo "🔧 Fixing repository mirrors to prevent Ubuntu/Debian conflicts..."
        
        # Replace any Ubuntu mirrors with Debian equivalents in ALL config files
        find config -type f \( -name "*.list*" -o -name "bootstrap" -o -name "binary" -o -name "common" -o -name "chroot" \) -exec sed -i \
          -e 's|security.ubuntu.com/ubuntu|security.debian.org/debian-security|g' \
          -e 's|archive.ubuntu.com|deb.debian.org|g' \
          -e 's|jammy-security|bookworm-security|g' \
          -e 's|focal-security|bookworm-security|g' \
          -e 's|bionic-security|bookworm-security|g' {} \; 2>/dev/null || true
        
        # Ensure proper Debian security mirror is used (use sudo as lb config creates root-owned files)
        if [ -f config/archives/security.chroot ]; then
          sudo sed -i 's|^http.*security.*|http://security.debian.org/debian-security bookworm-security main contrib non-free|g' config/archives/security.chroot
          echo "✅ Fixed security.chroot mirror"
        else
          echo "⚠️ security.chroot not found yet, will be created by lb config"
        fi
        
        echo "✅ Mirror fix complete"

    - name: Configure live-build for T430
      working-directory: live-build
      run: |
        echo "Configuring live-build with lb config..."
        
        # Remove any previous config to ensure clean state
        rm -rf config/* 2>/dev/null || true
        
        # Run lb config with ONLY command-line options
        # live-build automatically creates and reads config/common, config/bootstrap, etc.
        sudo lb config \
          --distribution bookworm \
          --architectures amd64 \
          --mirror-bootstrap http://deb.debian.org/debian \
          --binary-images iso-hybrid \
          --linux-flavours amd64 \
          --memtest memtest86+ \
          --apt-indices false
        
        echo "Configuration complete"
        ls -la config/
        
        echo "🔧 CRITICAL: Fixing repository mirrors AFTER lb config generates files..."
        
        # 1. Fix the main sources.list in config/archives/list.chroot
        if [ -f config/archives/list.chroot ]; then
          sed -i 's|http://security.ubuntu.com/ubuntu.*|http://security.debian.org/debian-security bookworm-security main contrib non-free|g' config/archives/list.chroot
          sed -i '/restricted/d' config/archives/list.chroot
        fi
        
        # 2. Fix security.chroot specifically
        if [ -f config/archives/security.chroot ]; then
          sed -i 's|^http.*security.*|http://security.debian.org/debian-security bookworm-security main contrib non-free|g' config/archives/security.chroot
          sed -i '/restricted/d' config/archives/security.chroot
        else
          # Create it if missing
          echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" > config/archives/security.chroot
        fi
        
        # 3. Fix ALL archive config files
        find config/archives -type f -exec sed -i \
          -e 's|security.ubuntu.com/ubuntu|security.debian.org/debian-security|g' \
          -e 's|archive.ubuntu.com|deb.debian.org|g' \
          -e 's|jammy-security|bookworm-security|g' \
          -e 's|focal-security|bookworm-security|g' \
          -e 's|bionic-security|bookworm-security|g' \
          -e '/restricted/d' \
          {} \; 2>/dev/null || true
        
        echo "✅ Verifying fixed sources:"
        echo "--- config/archives/list.chroot ---"
        cat config/archives/list.chroot 2>/dev/null || echo "File not found"
        echo ""
        echo "--- config/archives/security.chroot ---"
        cat config/archives/security.chroot 2>/dev/null || echo "File not found"

    - name: Build the ISO with lb build
      working-directory: live-build
      run: |
        echo "Starting lb build..."
        sudo lb build 2>&1 | tee build.log

        echo "Checking for ISO files..."
        ls -la *.iso 2>/dev/null || \
          ls -la live-image*.iso 2>/dev/null || \
          echo "Looking for ISO..."

        mkdir -p ../artifacts
        if ls *.iso 2>/dev/null; then
          cp *.iso ../artifacts/
        elif ls live-image*.iso 2>/dev/null; then
          cp live-image*.iso ../artifacts/
        else
          echo "Warning: No ISO found, checking binary..."
          find . -name "*.iso" -exec cp {} ../artifacts/ \; 2>/dev/null || true
        fi

    - name: Generate build report
      run: |
        mkdir -p artifacts
        {
          echo "# T430 OS Build Report"
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "**Commit:** ${GITHUB_SHA:-unknown}"
          echo "**Runner:** ubuntu-22.04"
          echo ""
          echo "## Build Status"
          if [ -d live-build/config ]; then
            echo "- Configuration: ✅ Success"
          else
            echo "- Configuration: ❌ Missing"
          fi
          if [ -f live-build/build.log ]; then
            echo "- Build Log: ✅ Generated"
          else
            echo "- Build Log: ⚠️ Missing"
          fi
          iso_count=$(ls artifacts/*.iso 2>/dev/null | wc -l)
          if [ "$iso_count" -gt 0 ]; then
            echo "- ISO: ✅ Created ($iso_count file(s))"
          else
            echo "- ISO: ❌ Failed"
          fi
          echo ""
          echo "## Package Lists"
          for f in live-build/config/package-lists/*.list.chroot; do
            if [ -f "$f" ]; then
              count=$(grep -v '^#' "$f" | grep -v '^$' | wc -l)
              echo "- $(basename "$f"): $count packages"
            fi
          done
          echo ""
          echo "## Next Steps"
          echo "1. Download ISO from artifacts"
          echo "2. Test on real ThinkPad T430 hardware"
          echo "3. Verify all T430-specific features work"
        } > artifacts/BUILD_REPORT.md
        cat artifacts/BUILD_REPORT.md

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: t430-os-iso
        path: artifacts/*.iso
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          artifacts/BUILD_REPORT.md
          live-build/build.log
          live-build/*.log
        retention-days: 7
        if-no-files-found: ignore
