---
name: Build T430 OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: UTC

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Make ALL scripts executable (CRITICAL FIX)
      run: |
        echo "🔧 Setting execute permissions on ALL scripts..."
        
        # Set permissions from repository root
        chmod +x live-build/build.sh || echo "Warning: build.sh not found"
        chmod +x live-build/config/bootstrap || true
        chmod +x live-build/config/binary || true
        chmod +x live-build/config/chroot || true
        chmod +x live-build/config/common || true
        
        # Set permissions on all hook files
        find live-build/config/hooks -type f -name "*.hook*" -exec chmod +x {} \; 2>/dev/null || true
        
        # Set permissions on ALL .sh files recursively
        find live-build -type f -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
        
        # Verify permissions
        echo "✅ Verifying permissions:"
        ls -la live-build/build.sh
        ls -la live-build/config/
        ls -la live-build/config/hooks/normal/ 2>/dev/null || echo "No normal hooks yet"

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo apt-get clean
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          live-build \
          debootstrap \
          xorriso \
          isolinux \
          syslinux-efi \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          dosfstools \
          squashfs-tools \
          fakeroot \
          rsync \
          wget \
          curl \
          git \
          cpio \
          zstd \
          lz4 \
          xz-utils

    - name: Nuclear Clean - Remove ALL contamination sources
      working-directory: live-build
      run: |
        echo "🧹 NUCLEAR CLEAN: Removing ALL potential Ubuntu mirror contamination..."
        
        # Remove EVERYTHING that could contain bad mirrors
        sudo rm -rf config/ auto/ cache/ .build/ 2>/dev/null || true
        
        # Also clean any preseed or package-lists with Ubuntu references
        find . -type f \( -name "*.preseed" -o -name "*.cfg" \) -exec grep -l "ubuntu" {} \; 2>/dev/null | xargs rm -f || true
        
        echo "✅ Clean slate achieved"

    - name: Configure live-build (Clean & Strong)
      working-directory: live-build
      run: |
        echo "🔧 Running lb config with proper Debian settings..."
        sudo lb config \
          --distribution bookworm \
          --architectures amd64 \
          --archive-areas "main contrib non-free non-free-firmware" \
          --mirror-bootstrap "http://deb.debian.org/debian" \
          --mirror-chroot "http://deb.debian.org/debian" \
          --mirror-binary "http://deb.debian.org/debian" \
          --binary-images iso-hybrid \
          --linux-flavours amd64 \
          --apt-indices false \
          --debian-installer false \
          --memtest memtest86+

        echo "🛠️ Final mirror hardening..."
        
        # 1. Force correct security archive (single line, no trailing spaces)
        printf "deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware\n" | \
          sudo tee config/archives/security.chroot > /dev/null

        # 2. Force correct debian archive
        printf "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware\n" | \
          sudo tee config/archives/debian.chroot > /dev/null

        # 3. CRITICAL: Create a chroot hook to fix /etc/apt/sources.list INSIDE the build
        mkdir -p config/hooks/normal
        cat << 'HOOK_EOF' | sudo tee config/hooks/normal/fix-sources-list.hook.chroot > /dev/null
#!/bin/bash
set -e
echo "🔧 Fixing /etc/apt/sources.list inside chroot..."
cat > /etc/apt/sources.list << 'SOURCES_EOF'
deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
SOURCES_EOF
chmod 644 /etc/apt/sources.list
echo "✅ Sources list fixed, running apt-get update..."
apt-get update
HOOK_EOF
        chmod +x config/hooks/normal/fix-sources-list.hook.chroot

        # 4. Remove any remaining Ubuntu/restricted garbage from config files
        sudo find config/ -type f -exec sed -i \
          -e 's|security.ubuntu.com[^ ]*|security.debian.org/debian-security|g' \
          -e 's|archive.ubuntu.com|deb.debian.org|g' \
          -e '/restricted/d' \
          {} \;

        echo "✅ Final sources check:"
        ls -la config/archives/
        echo "--- security.chroot ---"
        cat config/archives/security.chroot 2>/dev/null || true
        echo "--- debian.chroot ---"
        cat config/archives/debian.chroot 2>/dev/null || true
        echo "--- Hook created ---"
        ls -la config/hooks/normal/

    - name: Build the ISO with lb build
      working-directory: live-build
      run: |
        echo "Starting lb build..."
        sudo lb build 2>&1 | tee build.log

        echo "Checking for ISO files..."
        ls -la *.iso 2>/dev/null || \
          ls -la live-image*.iso 2>/dev/null || \
          echo "Looking for ISO..."

        mkdir -p ../artifacts
        if ls *.iso 2>/dev/null; then
          cp *.iso ../artifacts/
        elif ls live-image*.iso 2>/dev/null; then
          cp live-image*.iso ../artifacts/
        else
          echo "Warning: No ISO found, checking binary..."
          find . -name "*.iso" -exec cp {} ../artifacts/ \; 2>/dev/null || true
        fi

    - name: Generate build report
      run: |
        mkdir -p artifacts
        {
          echo "# T430 OS Build Report"
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "**Commit:** ${GITHUB_SHA:-unknown}"
          echo "**Runner:** ubuntu-22.04"
          echo ""
          echo "## Build Status"
          if [ -d live-build/config ]; then
            echo "- Configuration: ✅ Success"
          else
            echo "- Configuration: ❌ Missing"
          fi
          if [ -f live-build/build.log ]; then
            echo "- Build Log: ✅ Generated"
          else
            echo "- Build Log: ⚠️ Missing"
          fi
          iso_count=$(ls artifacts/*.iso 2>/dev/null | wc -l)
          if [ "$iso_count" -gt 0 ]; then
            echo "- ISO: ✅ Created ($iso_count file(s))"
          else
            echo "- ISO: ❌ Failed"
          fi
          echo ""
          echo "## Package Lists"
          for f in live-build/config/package-lists/*.list.chroot; do
            if [ -f "$f" ]; then
              count=$(grep -v '^#' "$f" | grep -v '^$' | wc -l)
              echo "- $(basename "$f"): $count packages"
            fi
          done
          echo ""
          echo "## Next Steps"
          echo "1. Download ISO from artifacts"
          echo "2. Test on real ThinkPad T430 hardware"
          echo "3. Verify all T430-specific features work"
        } > artifacts/BUILD_REPORT.md
        cat artifacts/BUILD_REPORT.md

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: t430-os-iso
        path: artifacts/*.iso
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          artifacts/BUILD_REPORT.md
          live-build/build.log
          live-build/*.log
        retention-days: 7
        if-no-files-found: ignore

