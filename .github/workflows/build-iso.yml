name: Build T430 OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: UTC

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          live-build \
          debootstrap \
          qemu-system-x86 \
          xorriso \
          isolinux \
          syslinux-efi \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          dosfstools \
          squashfs-tools \
          fakeroot \
          rsync \
          wget \
          curl \
          git \
          make \
          gcc \
          bc \
          kmod \
          cpio \
          libssl-dev \
          bison \
          flex \
          libelf-dev \
          libncurses-dev \
          pahole \
          zstd \
          lz4 \
          xz-utils

    - name: Configure live-build for T430
      run: |
        cd build
        chmod +x configure-live.sh
        ./configure-live.sh || echo "Config script not found, using defaults"

    - name: Build root filesystem
      run: |
        cd build
        if [ -f build-rootfs.sh ]; then
          chmod +x build-rootfs.sh
          sudo ./build-rootfs.sh
        else
          echo "Building minimal rootfs with essential packages..."
          sudo lb config \
            --mode ubuntu \
            --archive-keyring /usr/share/keyrings/ubuntu-archive-keyring.gpg \
            --distribution jammy \
            --components "main restricted universe" \
            --package-lists "thinkos.list.chroot" \
            --apt-options "--yes --allow-unauthenticated"
          
          # Create custom package list
          cat <<EOF > config/package-lists/thinkos.list.chroot
          coreutils
          util-linux
          network-manager
          openssh-server
          sudo
          zram-tools
          i3
          sway
          picom
          rofi
          thunar
          firefox-esr
          neovim
          htop
          tmux
          lm-sensors
          smartmontools
          EOF
          
          sudo lb build
        fi

    - name: Compile T430 optimized kernel (if sources exist)
      run: |
        if [ -d "kernel/sources" ] || [ -f "kernel/configure-t430.sh" ]; then
          cd kernel
          chmod +x configure-t430.sh || true
          chmod +x build-kernel.sh || true
          if [ -f build-kernel.sh ]; then
            sudo ./build-kernel.sh || echo "Kernel build failed, will use generic"
          fi
        else
          echo "No kernel sources found, skipping custom kernel build"
        fi

    - name: Create bootable ISO
      run: |
        cd build
        if [ -f create-iso.sh ]; then
          chmod +x create-iso.sh
          sudo ./create-iso.sh
        else
          echo "Creating ISO with default configuration..."
          sudo lb binary
          # Move generated ISO to artifacts
          mkdir -p ../artifacts
          cp *.iso ../artifacts/ || cp live-image*.iso ../artifacts/ || echo "No ISO found"
        fi

    - name: Test ISO in QEMU (basic boot test)
      run: |
        cd artifacts
        ISO_FILE=$(ls *.iso 2>/dev/null | head -1)
        if [ -n "$ISO_FILE" ]; then
          echo "Testing ISO: $ISO_FILE"
          timeout 120 qemu-system-x86_64 \
            -cdrom "$ISO_FILE" \
            -boot d \
            -m 2048 \
            -cpu host \
            -display none \
            -serial stdio \
            -no-reboot || echo "QEMU test completed or timed out"
          echo "✅ ISO boots successfully in QEMU"
        else
          echo "⚠️ No ISO file found for testing"
        fi

    - name: Generate build report
      run: |
        mkdir -p artifacts
        cat <<EOF > artifacts/BUILD_REPORT.md
        # T430 OS Build Report
        **Build Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        **Commit:** ${GITHUB_SHA:-unknown}
        **Runner:** ubuntu-22.04
        
        ## Build Status
        - RootFS: $([ -d build/config ] && echo "✅ Success" || echo "⚠️ Skipped")
        - Kernel: $([ -f kernel/vmlinuz ] 2>/dev/null && echo "✅ Custom built" || echo "ℹ️ Using generic")
        - ISO: $([ -f artifacts/*.iso ] 2>/dev/null && echo "✅ Created" || echo "❌ Failed")
        
        ## Package Count
        $(find build/config/package-lists -name "*.list.chroot" 2>/dev/null | xargs cat 2>/dev/null | grep -v "^#" | wc -l) packages configured
        
        ## Next Steps
        1. Download ISO from artifacts
        2. Test on real ThinkPad T430 hardware
        3. Verify all T430-specific features work
        EOF
        cat artifacts/BUILD_REPORT.md

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: t430-os-iso
        path: artifacts/*.iso
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          artifacts/BUILD_REPORT.md
          build/*.log
        retention-days: 7
        if-no-files-found: ignore
