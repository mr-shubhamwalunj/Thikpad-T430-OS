---
name: Build T430 OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: UTC

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make scripts executable
      run: |
        chmod +x live-build/build.sh
        chmod +x live-build/config/*.sh 2>/dev/null || true
        chmod +x live-build/config/hooks/normal/*.hook.chroot 2>/dev/null || true
        find live-build -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
        find live-build -name "*.hook*" -exec chmod +x {} \; 2>/dev/null || true
        ls -la live-build/
        ls -la live-build/config/ 2>/dev/null || true

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo apt-get clean
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          live-build \
          debootstrap \
          xorriso \
          isolinux \
          syslinux-efi \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          dosfstools \
          squashfs-tools \
          fakeroot \
          rsync \
          wget \
          curl \
          git \
          cpio \
          zstd \
          lz4 \
          xz-utils

    - name: Configure live-build for T430
      working-directory: live-build
      run: |
        echo "Configuring live-build..."
        chmod +x build.sh

        if [ -f config/bootstrap ]; then
          bash config/bootstrap
        fi
        if [ -f config/binary ]; then
          bash config/binary
        fi
        if [ -f config/chroot ]; then
          bash config/chroot
        fi

        echo "Configuration complete"
        ls -la config/

    - name: Build the ISO with lb build
      working-directory: live-build
      run: |
        echo "Starting lb build..."
        sudo lb build 2>&1 | tee build.log

        echo "Checking for ISO files..."
        ls -la *.iso 2>/dev/null || \
          ls -la live-image*.iso 2>/dev/null || \
          echo "Looking for ISO..."

        mkdir -p ../artifacts
        if ls *.iso 2>/dev/null; then
          cp *.iso ../artifacts/
        elif ls live-image*.iso 2>/dev/null; then
          cp live-image*.iso ../artifacts/
        else
          echo "Warning: No ISO found, checking binary..."
          find . -name "*.iso" -exec cp {} ../artifacts/ \; 2>/dev/null || true
        fi

    - name: Generate build report
      run: |
        mkdir -p artifacts
        {
          echo "# T430 OS Build Report"
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "**Commit:** ${GITHUB_SHA:-unknown}"
          echo "**Runner:** ubuntu-22.04"
          echo ""
          echo "## Build Status"
          if [ -d live-build/config ]; then
            echo "- Configuration: ✅ Success"
          else
            echo "- Configuration: ❌ Missing"
          fi
          if [ -f live-build/build.log ]; then
            echo "- Build Log: ✅ Generated"
          else
            echo "- Build Log: ⚠️ Missing"
          fi
          iso_count=$(ls artifacts/*.iso 2>/dev/null | wc -l)
          if [ "$iso_count" -gt 0 ]; then
            echo "- ISO: ✅ Created ($iso_count file(s))"
          else
            echo "- ISO: ❌ Failed"
          fi
          echo ""
          echo "## Package Lists"
          for f in live-build/config/package-lists/*.list.chroot; do
            if [ -f "$f" ]; then
              count=$(grep -v '^#' "$f" | grep -v '^$' | wc -l)
              echo "- $(basename "$f"): $count packages"
            fi
          done
          echo ""
          echo "## Next Steps"
          echo "1. Download ISO from artifacts"
          echo "2. Test on real ThinkPad T430 hardware"
          echo "3. Verify all T430-specific features work"
        } > artifacts/BUILD_REPORT.md
        cat artifacts/BUILD_REPORT.md

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: t430-os-iso
        path: artifacts/*.iso
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          artifacts/BUILD_REPORT.md
          live-build/build.log
          live-build/*.log
        retention-days: 7
        if-no-files-found: ignore
